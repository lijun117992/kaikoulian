  <!-- Sofa -->
  <rect x="120" y="100" width="220" height="80" rx="10" fill="#ffffff" stroke="#2b2825" stroke-width="3"/>
  <text x="190" y="145" font-size="16" font-weight="bold" fill="#78726a">主沙发</text>
  <!-- Coffee Table -->
  <rect x="160" y="210" width="140" height="60" rx="6" fill="#f7eedc" stroke="#c8956c" stroke-width="3"/>
  <text x="200" y="245" font-size="14" font-weight="bold" fill="#c8956c">茶几</text>
  <!-- TV Bench -->
  <rect x="120" y="310" width="220" height="30" fill="#ffffff" stroke="#2b2825" stroke-width="3"/>
