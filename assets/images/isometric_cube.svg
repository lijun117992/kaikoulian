<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="280">
  <rect width="600" height="400" fill="#faf8f5" stroke="#e8e2d9" stroke-width="2"/>
  <!-- 1:1:1 Isometric Cube -->
  <g transform="translate(300, 200)">
    <!-- Top Face -->
    <polygon points="0,-90 100,-40 0,10 -100,-40" fill="#f7eedc" stroke="#c8956c" stroke-width="4"/>
    <!-- Left Face -->
    <polygon points="-100,-40 0,10 0,110 -100,60" fill="#ffffff" stroke="#c8956c" stroke-width="4"/>
    <!-- Right Face -->
    <polygon points="0,10 100,-40 100,60 0,110" fill="#e8e2d9" stroke="#c8956c" stroke-width="4"/>
  </g>
  <text x="220" y="360" font-size="16" font-family="sans-serif" font-weight="bold" fill="#2b2825">1:1:1 轴侧标准立方体 (Axonometric Cube)</text>
</svg>